<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🪐 Tiny Planet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#03060e; overflow:hidden; font-family:'Segoe UI',sans-serif; touch-action:none; }

#setup {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 60%, #0d1b3e 0%, #050810 70%);
}
.sf { position:absolute; inset:0; overflow:hidden; }
.st { position:absolute; border-radius:50%; background:#fff; animation:tw 3s ease-in-out infinite; }
@keyframes tw { 0%,100%{opacity:.15} 50%{opacity:.9} }
.card {
  position:relative; z-index:1;
  background:rgba(6,14,38,0.92); border:1px solid #1a3668;
  border-radius:18px; padding:34px 42px; width:min(370px,92vw);
}
.card h1 { text-align:center; font-size:25px; color:#d0e8ff; margin-bottom:3px; }
.sub { text-align:center; font-size:10px; color:#3a6a8a; letter-spacing:3px; text-transform:uppercase; margin-bottom:26px; }
.lbl { font-size:10px; color:#4a7a9a; letter-spacing:2px; text-transform:uppercase; margin:13px 0 4px; }
input[type=text] {
  width:100%; padding:9px 12px; border-radius:8px;
  background:rgba(255,255,255,0.05); border:1px solid #1a4470;
  color:#b8e0ff; font-size:15px; outline:none;
}
input:focus { border-color:#3080d0; }
.clrs { display:flex; gap:8px; flex-wrap:wrap; margin-top:3px; }
.cb { width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:border-color .14s, transform .14s; }
.cb.sel { border-color:#fff; transform:scale(1.2); }
.go {
  width:100%; margin-top:20px; padding:12px;
  background:linear-gradient(135deg,#1848b8,#3878f8);
  color:#fff; font-size:15px; font-weight:700; border:none;
  border-radius:10px; cursor:pointer; text-transform:uppercase; letter-spacing:1px;
  box-shadow:0 4px 18px #1848b844; transition:opacity .18s;
}
.go:hover { opacity:.88; }

#hud {
  position:fixed; top:0; left:0; right:0; pointer-events:none; z-index:10;
  text-align:center; padding-top:11px;
}
#hud span { font-size:12px; color:#80b8f8; letter-spacing:3px; text-transform:uppercase; }

#dpad {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  display:none; z-index:20;
}
.dp { display:grid; grid-template-columns:repeat(3,46px); grid-template-rows:repeat(3,46px); gap:3px; }
.db {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.17);
  border-radius:9px; color:#ddd; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.db:active,.db.on { background:rgba(255,255,255,0.28); }

#cbtn {
  position:fixed; right:16px; bottom:86px; width:48px; height:48px;
  border-radius:50%; background:rgba(18,46,110,0.92); border:1px solid #284888;
  font-size:21px; cursor:pointer; display:none; align-items:center; justify-content:center;
  z-index:20; box-shadow:0 3px 12px #00000066; -webkit-tap-highlight-color:transparent;
}
#nbadge {
  position:absolute; top:2px; right:2px; width:9px; height:9px;
  border-radius:50%; background:#f84; display:none;
}
#cpanel {
  position:fixed; right:16px; top:50%; transform:translateY(-50%);
  width:min(280px,calc(100vw - 30px));
  background:rgba(3,8,24,0.94); border:1px solid #142450;
  border-radius:14px; display:none; flex-direction:column;
  z-index:20; backdrop-filter:blur(12px); box-shadow:0 6px 38px #000000aa;
}
#cpanel.open { display:flex; }
.ch { padding:10px 14px; border-bottom:1px solid #142450; font-size:10px; color:#3a6898; letter-spacing:2px; text-transform:uppercase; display:flex; align-items:center; gap:6px; }
.dot { width:6px; height:6px; border-radius:50%; background:#44ff00; animation:bl 2s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.25} }
#msgs { flex:1; overflow-y:auto; padding:9px; display:flex; flex-direction:column; gap:6px; min-height:70px; max-height:250px; }
#msgs::-webkit-scrollbar { width:3px; }
#msgs::-webkit-scrollbar-thumb { background:#1e3a6a; }
.m { font-size:13px; line-height:1.5; border-radius:8px; padding:6px 10px; max-width:88%; }
.m.a { background:rgba(20,60,15,.6); color:#88ffcc; align-self:flex-start; border:1px solid #1a481a; }
.m.p { background:rgba(10,28,80,.6); color:#aaccff; align-self:flex-end; border:1px solid #18285e; }
@keyframes ld { 0%,100%{opacity:.3} 50%{opacity:1} }
.m.ld { animation:ld 1.1s infinite; }
.cir { display:flex; gap:5px; padding:8px 10px; border-top:1px solid #142450; }
#ci { flex:1; background:rgba(255,255,255,0.04); border:1px solid #1a3460; border-radius:7px; padding:6px 8px; color:#b8d8ff; font-size:13px; outline:none; }
#cs { background:#1848b8; border:none; border-radius:7px; color:#fff; padding:6px 10px; cursor:pointer; font-weight:700; }

#labels { position:fixed; inset:0; pointer-events:none; z-index:9; }
.l3 {
  position:absolute; transform:translateX(-50%);
  font-size:11px; color:#fff; white-space:nowrap;
  background:rgba(0,0,0,0.42); padding:1px 6px; border-radius:4px;
  text-shadow:0 1px 2px #000;
}

@media(max-width:580px){
  #cpanel { right:0;left:0;bottom:0;top:auto;transform:none;width:100%;max-height:52vh;border-radius:13px 13px 0 0; }
  #cbtn { right:14px; bottom:108px; }
}
</style>
</head>
<body>

<div id="setup">
  <div class="sf" id="sf"></div>
  <div class="card">
    <h1>🪐 Tiny Planet</h1>
    <div class="sub">Planet Kai-9</div>
    <div class="lbl">Your Name</div>
    <input type="text" id="pname" placeholder="Goku" maxlength="14" autocomplete="off">
    <div class="lbl">Your Color</div>
    <div class="clrs" id="clrs"></div>
    <button class="go" id="go">Land on Planet →</button>
  </div>
</div>

<div id="hud"><span>🪐 KAI-9 &nbsp;·&nbsp; <span id="sc">0</span> steps</span></div>
<div id="labels"></div>

<div id="dpad">
  <div class="dp">
    <div></div><div class="db" id="bu">▲</div><div></div>
    <div class="db" id="bl">◀</div><div></div><div class="db" id="br">▶</div>
    <div></div><div class="db" id="bd">▼</div><div></div>
  </div>
</div>

<button id="cbtn">👽<div id="nbadge"></div></button>
<div id="cpanel">
  <div class="ch"><div class="dot"></div>Zyx the Alien</div>
  <div id="msgs"></div>
  <div class="cir">
    <input type="text" id="ci" placeholder="Say something…" maxlength="200">
    <button id="cs">↑</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Setup stars
(()=>{
  const sf=document.getElementById('sf');
  for(let i=0;i<150;i++){
    const s=document.createElement('div');
    s.className='st';
    const z=Math.random()<.15?2.5:1.2;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${z}px;height:${z}px;animation-delay:${(Math.random()*3).toFixed(1)}s`;
    sf.appendChild(s);
  }
})();

// Color picker
const PAL=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9ff3','#ff9f43','#a29bfe','#00cec9','#fd79a8','#55efc4'];
let pickedCol=PAL[3];
const clrsEl=document.getElementById('clrs');
PAL.forEach(c=>{
  const b=document.createElement('button');
  b.className='cb'+(c===pickedCol?' sel':'');
  b.style.background=c;
  b.onclick=()=>{ pickedCol=c; clrsEl.querySelectorAll('.cb').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  clrsEl.appendChild(b);
});
document.getElementById('pname').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('go').click(); });
document.getElementById('go').onclick=()=>{
  const name=document.getElementById('pname').value.trim()||'Traveler';
  document.getElementById('setup').style.display='none';
  document.getElementById('dpad').style.display='block';
  document.getElementById('cbtn').style.display='flex';
  go(name,pickedCol);
};

// ============================================================
function go(PNAME, PCOL){
  const W=()=>window.innerWidth, H=()=>window.innerHeight;

  // Renderer
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x03060e,1);
  renderer.setSize(W(),H());
  renderer.domElement.style.cssText='position:fixed;top:0;left:0;z-index:1;';
  document.body.appendChild(renderer.domElement);
  window.addEventListener('resize',()=>{ renderer.setSize(W(),H()); cam.aspect=W()/H(); cam.updateProjectionMatrix(); });

  const scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x03060e,0.016);

  const cam=new THREE.PerspectiveCamera(55,W()/H(),0.05,300);

  // Lights
  scene.add(new THREE.AmbientLight(0x8090b0,1.0));
  const sun=new THREE.DirectionalLight(0xfff0cc,1.5); sun.position.set(10,16,8); scene.add(sun);
  const fill=new THREE.DirectionalLight(0x3060c0,0.35); fill.position.set(-8,-4,-10); scene.add(fill);

  // Stars
  {
    const g=new THREE.BufferGeometry(), v=[];
    for(let i=0;i<2200;i++){
      const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=90+Math.random()*30;
      v.push(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));
    }
    g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
    scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.2})));
  }

  // Toon material helper
  function toon(color){
    const c=document.createElement('canvas'); c.width=4; c.height=1;
    const ctx=c.getContext('2d');
    ['#3a3a3a','#787878','#b8b8b8','#eeeeee'].forEach((v,i)=>{ ctx.fillStyle=v; ctx.fillRect(i,0,1,1); });
    const t=new THREE.CanvasTexture(c);
    t.magFilter=t.minFilter=THREE.NearestFilter;
    return new THREE.MeshToonMaterial({color,gradientMap:t});
  }

  // PLANET
  const PR=6;
  const planet=new THREE.Mesh(new THREE.SphereGeometry(PR,48,48),toon(0x38a040));
  scene.add(planet);

  // Equator ring
  const ring=new THREE.Mesh(new THREE.TorusGeometry(PR+0.12,0.07,6,60),toon(0x70ccff));
  ring.rotation.x=Math.PI/2.4;
  scene.add(ring);

  // Atmosphere
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(PR+0.3,32,32),
    new THREE.MeshBasicMaterial({color:0x4090ff,transparent:true,opacity:0.05,side:THREE.BackSide,depthWrite:false})
  ));

  // Place helper: lat/lon degrees -> world position, orient group "up" from sphere
  const _q=new THREE.Quaternion(), _up=new THREE.Vector3(0,1,0), _norm=new THREE.Vector3();
  function place(obj,lat,lon,rise=0){
    const la=lat*Math.PI/180, lo=lon*Math.PI/180, r=PR+rise;
    obj.position.set(r*Math.cos(la)*Math.sin(lo), r*Math.sin(la), r*Math.cos(la)*Math.cos(lo));
    _norm.copy(obj.position).normalize();
    _q.setFromUnitVectors(_up,_norm);
    obj.quaternion.copy(_q);
  }

  // TREES
  function mkTree(){
    const g=new THREE.Group();
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.07,.11,.5,6),toon(0x7a3418)),{position:new THREE.Vector3(0,.25,0)}));
    const f=new THREE.Mesh(new THREE.SphereGeometry(.38,7,7),toon(0x208030)); f.position.y=.7; g.add(f);
    const t=new THREE.Mesh(new THREE.SphereGeometry(.22,6,6),toon(0x28aa40)); t.position.y=1.0; g.add(t);
    return g;
  }
  [[18,55],[35,140],[-12,195],[28,-65],[8,295],[-22,255],[-40,100],[15,330]].forEach(([la,lo])=>{
    const t=mkTree(); place(t,la,lo); scene.add(t);
    t._la=la; t._lo=lo;
  });

  // MONKEY
  function mkMonkey(){
    const g=new THREE.Group();
    const bm=toon(0xc07828);
    const body=new THREE.Mesh(new THREE.SphereGeometry(.22,8,8),bm); body.position.y=.22; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.18,8,8),bm); head.position.y=.54; g.add(head);
    const face=new THREE.Mesh(new THREE.SphereGeometry(.11,6,6),toon(0xdc9e58)); face.position.set(0,.54,.12); g.add(face);
    [-0.07,.07].forEach(x=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(.034,5,5),new THREE.MeshBasicMaterial({color:0x111})); e.position.set(x,.58,.21); g.add(e); });
    const tail=new THREE.Mesh(new THREE.TorusGeometry(.17,.03,5,12,Math.PI*1.4),bm);
    tail.position.set(-.17,.14,-.04); tail.rotation.z=.6; g.add(tail);
    return g;
  }
  const monkey=mkMonkey(); scene.add(monkey);
  let mLon=170, mTLon=190;

  // ALIEN
  function mkAlien(){
    const g=new THREE.Group();
    const gm=toon(0x44ee55);
    const bm=new THREE.Mesh(new THREE.CylinderGeometry(.13,.16,.32,8),gm); bm.position.y=.28; g.add(bm);
    const bc=new THREE.Mesh(new THREE.SphereGeometry(.16,8,6),gm); bc.position.y=.12; g.add(bc);
    const tc=new THREE.Mesh(new THREE.SphereGeometry(.13,8,6),gm); tc.position.y=.44; g.add(tc);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.22,10,10),toon(0x33dd44)); head.position.y=.72; g.add(head);
    [-0.09,.09].forEach(x=>{
      const e=new THREE.Mesh(new THREE.SphereGeometry(.07,7,7),new THREE.MeshBasicMaterial({color:0x080808})); e.position.set(x,.75,.19); g.add(e);
      const s=new THREE.Mesh(new THREE.SphereGeometry(.024,4,4),new THREE.MeshBasicMaterial({color:0xffffff})); s.position.set(x+.024,.77,.25); g.add(s);
    });
    [-0.11,.11].forEach(x=>{
      const st=new THREE.Mesh(new THREE.CylinderGeometry(.011,.011,.27,4),toon(0x22aa33)); st.position.set(x*1.1,.97,0); st.rotation.z=x*2.2; g.add(st);
      const b=new THREE.Mesh(new THREE.SphereGeometry(.044,5,5),toon(0xaaff44)); b.position.set(x*1.6,1.15,0); g.add(b);
    });
    return g;
  }
  const alien=mkAlien();
  place(alien,5,0);
  scene.add(alien);

  // PLAYER
  function mkPlayer(hex){
    const g=new THREE.Group();
    const cm=toon(new THREE.Color(hex));
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.12,.15,.38,8),cm); body.position.y=.19; g.add(body);
    [-0.07,.07].forEach(x=>{ const leg=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.22,6),cm); leg.position.set(x,-.11,0); g.add(leg); });
    const head=new THREE.Mesh(new THREE.SphereGeometry(.17,9,9),toon(0xeebf88)); head.position.y=.5; g.add(head);
    const hair=new THREE.Mesh(new THREE.SphereGeometry(.18,8,7),toon(0x180800)); hair.position.set(0,.54,-.02); hair.scale.y=.58; g.add(hair);
    [-0.055,.055].forEach(x=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(.036,5,5),new THREE.MeshBasicMaterial({color:0x222})); e.position.set(x,.5,.14); g.add(e); });
    return g;
  }
  const player=mkPlayer(PCOL);
  let pLat=0, pLon=90;
  place(player,pLat,pLon);
  scene.add(player);

  // INPUT
  const keys={};
  window.addEventListener('keydown',e=>{ keys[e.code]=true; e.preventDefault(); });
  window.addEventListener('keyup',e=>keys[e.code]=false);

  const DMAP={bu:'ArrowUp',bd:'ArrowDown',bl:'ArrowLeft',br:'ArrowRight'};
  for(const [id,code] of Object.entries(DMAP)){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{ e.preventDefault(); keys[code]=true; el.classList.add('on'); },{passive:false});
    el.addEventListener('touchend',e=>{ e.preventDefault(); keys[code]=false; el.classList.remove('on'); },{passive:false});
    el.addEventListener('mousedown',()=>{ keys[code]=true; el.classList.add('on'); });
    ['mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,()=>{ keys[code]=false; el.classList.remove('on'); }));
  }

  // CAMERA DRAG
  let cyaw=0.0, cpitch=0.45, drag=false, lastXY={x:0,y:0}, touchCam=null;
  const cvs=renderer.domElement;
  cvs.addEventListener('mousedown',e=>{ drag=true; lastXY={x:e.clientX,y:e.clientY}; });
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove',e=>{
    if(!drag)return;
    cyaw-=(e.clientX-lastXY.x)*.006; cpitch=Math.max(.08,Math.min(1.3,cpitch+(e.clientY-lastXY.y)*.005)); lastXY={x:e.clientX,y:e.clientY};
  });
  cvs.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      const t=e.touches[0]; const hit=document.elementFromPoint(t.clientX,t.clientY);
      if(hit&&(hit.closest('#dpad')||hit.closest('#cpanel')||hit.closest('#cbtn')))return;
      touchCam={x:t.clientX,y:t.clientY};
    }
  },{passive:true});
  cvs.addEventListener('touchmove',e=>{
    if(touchCam&&e.touches.length===1){
      const t=e.touches[0];
      cyaw-=(t.clientX-touchCam.x)*.006; cpitch=Math.max(.08,Math.min(1.3,cpitch+(t.clientY-touchCam.y)*.005)); touchCam={x:t.clientX,y:t.clientY};
    }
  },{passive:true});
  cvs.addEventListener('touchend',()=>touchCam=null,{passive:true});

  // MOVEMENT
  let steps=0, moveCool=0, pBob=0;
  const SDEG=360/60;
  function moveP(dt){
    if(moveCool>0){moveCool-=dt;return;}
    let mv=false;
    if(keys['ArrowUp']||keys['KeyW'])   {pLat=Math.min(84,pLat+SDEG);mv=true;}
    if(keys['ArrowDown']||keys['KeyS']) {pLat=Math.max(-84,pLat-SDEG);mv=true;}
    if(keys['ArrowLeft']||keys['KeyA']) {pLon=(pLon-SDEG+360)%360;mv=true;}
    if(keys['ArrowRight']||keys['KeyD']){pLon=(pLon+SDEG)%360;mv=true;}
    if(mv){ steps++; document.getElementById('sc').textContent=steps; place(player,pLat,pLon); moveCool=0.11; pBob=0.18; }
  }

  // LABELS
  const labelsDiv=document.getElementById('labels');
  const ldefs=[{fn:()=>player,t:PNAME},{fn:()=>alien,t:'Zyx 👽'},{fn:()=>monkey,t:'Bubbles 🐵'}];
  const lels=ldefs.map(d=>{ const el=document.createElement('div'); el.className='l3'; el.textContent=d.t; labelsDiv.appendChild(el); return el; });
  const _vp=new THREE.Vector3();
  function updateLabels(){
    ldefs.forEach((d,i)=>{
      const o=d.fn(); const up=o.position.clone().normalize();
      _vp.copy(o.position).addScaledVector(up,.75); _vp.project(cam);
      if(_vp.z>1){lels[i].style.display='none';return;}
      lels[i].style.display='block';
      lels[i].style.left=((_vp.x+1)/2*W())+'px';
      lels[i].style.top=((1-_vp.y)/2*H())+'px';
    });
  }

  // CHAT
  const cbtn=document.getElementById('cbtn'), cpanel=document.getElementById('cpanel');
  const msgsD=document.getElementById('msgs'), ciEl=document.getElementById('ci');
  const nbadge=document.getElementById('nbadge');
  let chatOpen=false; const hist=[];
  cbtn.addEventListener('click',()=>{ chatOpen=!chatOpen; cpanel.classList.toggle('open',chatOpen); nbadge.style.display='none'; if(chatOpen) setTimeout(()=>ciEl.focus(),80); });
  function addMsg(txt,who){ const el=document.createElement('div'); el.className='m '+who; el.textContent=txt; msgsD.appendChild(el); msgsD.scrollTop=msgsD.scrollHeight; return el; }
  const SYS=`You are Zyx, a cheerful eccentric alien on Kai-9 — a tiny planet needing only 60 steps to walk around. You know ${PNAME} just arrived and Bubbles the monkey lives here too. Reply in 1-3 short fun sentences. Occasionally mention the trees, stars, or the planet's tiny size.`;
  async function sendChat(txt){
    if(!txt.trim())return; hist.push({role:'user',content:txt}); addMsg(txt,'p'); ciEl.value='';
    const ld=addMsg('…','a ld');
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:180,system:SYS,messages:hist})});
      const d=await r.json(); const rep=d.content?.[0]?.text||'*zyx static*';
      hist.push({role:'assistant',content:rep}); ld.remove(); addMsg(rep,'a'); alienBT=0.9;
      if(!chatOpen) nbadge.style.display='block';
    }catch{ ld.remove(); addMsg('*solar flare — try again!*','a'); }
  }
  document.getElementById('cs').addEventListener('click',()=>sendChat(ciEl.value));
  ciEl.addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(ciEl.value); });
  setTimeout(()=>{ addMsg(`Hey ${PNAME}! Welcome to Kai-9! I'm Zyx. It only takes 60 steps to walk around! 🌳`,'a'); nbadge.style.display='block'; },1800);

  // LOOP
  const clock=new THREE.Clock();
  let alienBT=0, mWT=0;
  const _tx=new THREE.Vector3(), _tz=new THREE.Vector3(), _pn=new THREE.Vector3(), _co=new THREE.Vector3(), _wup=new THREE.Vector3(0,1,0);

  function tick(){
    requestAnimationFrame(tick);
    const dt=Math.min(clock.getDelta(),.05);
    moveP(dt);

    // alien float
    alienBT=Math.max(0,alienBT-dt);
    const af=Math.sin(Date.now()*.0018)*.07+(alienBT>0?Math.sin(alienBT*10)*.15:0);
    place(alien,5,0,af);
    alien.rotation.y=Math.sin(Date.now()*.0009)*.38;

    // monkey wander
    mWT+=dt; if(mWT>2.8){mWT=0;mTLon+=(Math.random()-.5)*28;}
    mLon+=(mTLon-mLon)*.012;
    place(monkey,-18+Math.sin(Date.now()*.0008)*7,mLon%360);
    monkey.rotation.y+=.018;

    // player bob
    if(pBob>0){ pBob=Math.max(0,pBob-dt*3); place(player,pLat,pLon,Math.sin(pBob*Math.PI)*.1); }

    // camera
    _pn.copy(player.position).normalize();
    _tx.crossVectors(_wup,_pn).normalize();
    if(_tx.lengthSq()<.01) _tx.set(1,0,0);
    _tz.crossVectors(_pn,_tx).normalize();
    const cd=5.5, ch=3.0;
    _co.set(0,0,0)
      .addScaledVector(_tx, Math.sin(cyaw)*cd)
      .addScaledVector(_tz,-Math.cos(cyaw)*cd)
      .addScaledVector(_pn, ch+Math.sin(cpitch)*1.8);
    cam.position.copy(player.position).add(_co);
    cam.lookAt(player.position.clone().addScaledVector(_pn,.4));

    updateLabels();
    renderer.render(scene,cam);
  }
  tick();
}
</script>
</body>
</html>
